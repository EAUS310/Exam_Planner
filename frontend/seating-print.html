<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seating Plan — Exam Planner</title>
  <link rel="stylesheet" href="css/print.css">
  <style>
    @media screen {
      body { background: #f0f0f0; padding: 20px; }
      .screen-controls {
        width: 210mm;
        margin: 0 auto 16px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .screen-btn {
        padding: 8px 18px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        font-family: 'Segoe UI', Arial, sans-serif;
      }
      .screen-btn-primary { background: #1a3a5c; color: #fff; }
      .screen-btn-primary:hover { background: #2c5f8a; }
      .screen-btn-ghost {
        background: #fff;
        color: #1a3a5c;
        border: 1.5px solid #1a3a5c;
      }
      .screen-btn-ghost:hover { background: #d6e4f0; }
      .print-wrapper {
        background: transparent;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0;
      }
      .print-page {
        background: #fff;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        padding: 15mm 18mm;
        margin-bottom: 20px;
        width: 210mm;
        min-height: 297mm;
        position: relative;
        flex-shrink: 0;
      }
      .print-page:last-child {
        margin-bottom: 0;
      }
      #loadingMsg {
        text-align: center;
        padding: 40px;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: #555;
        font-size: 14px;
        background: #fff;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      }
    }
    @media print {
      .screen-controls { display: none !important; }
      .print-wrapper { background: transparent; padding: 0; margin: 0; max-width: 100%; }
      .print-page { box-shadow: none; padding: 0; margin: 0; min-height: 0; }
      body { background: #fff; padding: 0; }
    }
  </style>
</head>
<body>

<div class="screen-controls no-print">
  <button class="screen-btn screen-btn-primary" onclick="window.print()">&#128438; Print / Save as PDF</button>
  <button class="screen-btn screen-btn-ghost" onclick="window.close()">&#8592; Close</button>
</div>

<div class="print-wrapper">
  <div id="loadingMsg">Loading exam data…</div>
  <div id="printContent" style="display:none;"></div>
</div>

<script src="js/storage.js"></script>
<script>
  function escHtml(str) {
    return String(str || '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
  }

  function formatTime(t) {
    if (!t) return '';
    const [h, min] = t.split(':');
    const hour = parseInt(h);
    const ampm = hour >= 12 ? 'PM' : 'AM';
    const h12 = hour % 12 || 12;
    return `${h12}:${min} ${ampm}`;
  }

  function sortBySeat(students) {
    return [...students].sort((a, b) => {
      const sA = a.seatAssigned || '';
      const sB = b.seatAssigned || '';
      const colA = sA.charAt(0), colB = sB.charAt(0);
      const rowA = parseInt(sA.slice(1)) || 0;
      const rowB = parseInt(sB.slice(1)) || 0;
      if (colA !== colB) return colA.localeCompare(colB);
      return rowA - rowB;
    });
  }

  const FIRST_PAGE_ROWS = 15; // first page: 15 students (header takes space)
  const ROWS_PER_PAGE   = 25; // subsequent pages: 25 students

  function buildSeatingPage(exam, classroom, students, pageNum, totalPages, startIdx, rowsThisPage) {
    const isFirst = pageNum === 1;

    const headerHtml = `
      <div class="print-header">
        <div class="print-header-left">
          <div class="print-module-name">${escHtml(exam.moduleCode)} &mdash; ${escHtml(exam.moduleName)}</div>
          <div class="print-module-info">
            Instructor: ${escHtml(exam.instructorName)}
            ${pageNum > 1 ? `&nbsp;&nbsp;|&nbsp;&nbsp; <em>(Page ${pageNum} of ${totalPages})</em>` : ''}
          </div>
          <div class="print-uni-name">Emirates Aviation University &mdash; Faculty of Engineering</div>
          <div class="print-doc-title">
            ${escHtml(exam.semester)} &mdash; ${escHtml(exam.examName)} &mdash; SEATING PLAN
          </div>
        </div>
        <img src="assets/EAU_Group_logo.png" alt="EAU Logo" class="print-logo">
      </div>`;

    let infoBlockHtml = '';
    if (isFirst) {
      infoBlockHtml = `
        <div class="print-info-row">
          <div class="print-info-block">
            <table class="print-info-table">
              <tr><td>Module:</td><td>${escHtml(exam.moduleCode)} — ${escHtml(exam.moduleName)}</td></tr>
              <tr><td>Exam Type:</td><td>${escHtml(exam.examName)}</td></tr>
              <tr><td>Semester:</td><td>${escHtml(exam.semester)}</td></tr>
              <tr><td>Date:</td><td>${escHtml(formatDate(exam.date))}</td></tr>
            </table>
          </div>
          <div class="print-info-block">
            <table class="print-info-table">
              <tr><td>Venue:</td><td>${escHtml(classroom ? classroom.name : exam.venueId)}</td></tr>
              <tr><td>Instructor:</td><td>${escHtml(exam.instructorName)}</td></tr>
              <tr><td>Timings:</td><td>${escHtml(formatTime(exam.startTime))} — ${escHtml(formatTime(exam.endTime))}</td></tr>
            </table>
          </div>
        </div>`;
    }

    const pageStudents = students.slice(startIdx, startIdx + rowsThisPage);
    const rowsHtml = pageStudents.map((s, i) => `
      <tr>
        <td class="col-no">${startIdx + i + 1}</td>
        <td class="col-id">${escHtml(s.studentId)}</td>
        <td class="col-name-wide">${escHtml(s.studentName)}</td>
        <td class="col-seat" style="font-weight:bold; color:#1a3a5c; font-size:11pt;">${escHtml(s.seatAssigned || '—')}</td>
      </tr>`).join('');

    const tableHtml = `
      <table class="print-student-table">
        <thead>
          <tr>
            <th class="col-no">#</th>
            <th class="col-id">Student ID</th>
            <th class="col-name-wide">Student Full Name</th>
            <th class="col-seat">Seat</th>
          </tr>
        </thead>
        <tbody>${rowsHtml}</tbody>
      </table>`;

    const footerHtml = `
      <div class="print-footer">
        <span>${escHtml(exam.moduleCode)} — ${escHtml(exam.moduleName)} — ${escHtml(exam.examName)} — ${escHtml(formatDate(exam.date))} — SEATING PLAN</span>
        <span>Page ${pageNum} of ${totalPages}</span>
      </div>`;

    return `
      <div class="print-page">
        ${headerHtml}
        ${infoBlockHtml}
        ${tableHtml}
        ${footerHtml}
      </div>`;
  }

  function loadAndRender() {
    const params  = new URLSearchParams(window.location.search);
    const examId  = params.get('examId');
    if (!examId) {
      document.getElementById('loadingMsg').textContent = 'Error: No exam ID provided.';
      return;
    }

    try {
      const exam       = getExam(examId);
      const classrooms = getClassrooms();

      if (!exam) throw new Error('Exam not found');

      const classroom = classrooms.find(c => c.id === exam.venueId);
      document.title  = `Seating Plan — ${exam.moduleCode} ${exam.examName}`;

      const venueIds = exam.venueIds && exam.venueIds.length > 0 ? exam.venueIds : (exam.venueId ? [exam.venueId] : []);

      let pagesHtml = '';
      for (const venueId of venueIds) {
        const venueClassroom = classrooms.find(c => c.id === venueId);
        const venueStudents  = venueIds.length > 1
          ? exam.students.filter(s => s.venueId === venueId)
          : exam.students;
        const sorted = sortBySeat(venueStudents);
        if (sorted.length === 0) continue;
        const remaining  = Math.max(0, sorted.length - FIRST_PAGE_ROWS);
        const totalPages = 1 + Math.ceil(remaining / ROWS_PER_PAGE);
        for (let p = 1; p <= totalPages; p++) {
          const startIdx     = p === 1 ? 0 : FIRST_PAGE_ROWS + (p - 2) * ROWS_PER_PAGE;
          const rowsThisPage = p === 1 ? FIRST_PAGE_ROWS : ROWS_PER_PAGE;
          pagesHtml += buildSeatingPage(exam, venueClassroom || classroom, sorted, p, totalPages, startIdx, rowsThisPage);
        }
      }

      document.getElementById('loadingMsg').style.display = 'none';
      const content = document.getElementById('printContent');
      content.style.display = 'block';
      content.innerHTML = pagesHtml || '<p style="text-align:center;padding:40px;color:#888;">No students assigned to this exam yet.</p>';

    } catch (err) {
      document.getElementById('loadingMsg').textContent = 'Error loading exam: ' + err.message;
    }
  }

  // Wait for storage.js to finish its async init, then render
  setTimeout(loadAndRender, 50);
</script>
</body>
</html>
