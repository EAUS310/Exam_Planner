<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attendance Sheet — Exam Planner</title>
  <link rel="stylesheet" href="css/print.css">
  <style>
    @media screen {
      body { background: #f0f0f0; padding: 20px; }
      .screen-controls {
        max-width: 210mm;
        margin: 0 auto 16px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .screen-btn {
        padding: 8px 18px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 13px;
        font-weight: 600;
        font-family: 'Segoe UI', Arial, sans-serif;
      }
      .screen-btn-primary { background: #1a3a5c; color: #fff; }
      .screen-btn-primary:hover { background: #2c5f8a; }
      .screen-btn-ghost {
        background: #fff;
        color: #1a3a5c;
        border: 1.5px solid #1a3a5c;
      }
      .screen-btn-ghost:hover { background: #d6e4f0; }
      .print-wrapper {
        background: #fff;
        max-width: 210mm;
        margin: 0 auto;
        box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        padding: 15mm 18mm;
      }
      #loadingMsg {
        text-align: center;
        padding: 40px;
        font-family: 'Segoe UI', Arial, sans-serif;
        color: #555;
        font-size: 14px;
      }
    }
    @media print {
      .screen-controls { display: none !important; }
      .print-wrapper { box-shadow: none; padding: 0; margin: 0; max-width: 100%; }
      body { background: #fff; padding: 0; }
    }
  </style>
</head>
<body>

<div class="screen-controls no-print">
  <button class="screen-btn screen-btn-primary" onclick="window.print()">&#128438; Print / Save as PDF</button>
  <button class="screen-btn screen-btn-ghost" onclick="window.close()">&#8592; Close</button>
</div>

<div class="print-wrapper">
  <div id="loadingMsg">Loading exam data…</div>
  <div id="printContent" style="display:none;"></div>
</div>

<script src="js/storage.js"></script>
<script>
  function formatDate(dateStr) {
    if (!dateStr) return '';
    const [y, m, d] = dateStr.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${parseInt(d)} ${months[parseInt(m)-1]} ${y}`;
  }

  function formatTime(t) {
    if (!t) return '';
    const [h, min] = t.split(':');
    const hour = parseInt(h);
    const ampm = hour >= 12 ? 'PM' : 'AM';
    const h12 = hour % 12 || 12;
    return `${h12}:${min} ${ampm}`;
  }

  function sortBySeat(students) {
    return [...students].sort((a, b) => {
      const sA = a.seatAssigned || '';
      const sB = b.seatAssigned || '';
      const colA = sA.charAt(0), colB = sB.charAt(0);
      const rowA = parseInt(sA.slice(1)) || 0;
      const rowB = parseInt(sB.slice(1)) || 0;
      if (colA !== colB) return colA.localeCompare(colB);
      return rowA - rowB;
    });
  }

  const ROWS_PER_PAGE = 22;

  function buildAttendancePage(exam, classroom, students, pageNum, totalPages, startIdx) {
    const isFirst = pageNum === 1;

    const headerHtml = `
      <div class="print-header">
        <div class="print-header-left">
          <div class="print-uni-name">Emirates Aviation University &mdash; Faculty of Engineering</div>
          <div class="print-doc-title">
            ${exam.semester} &mdash; ${exam.examName} &mdash; ATTENDANCE SHEET
          </div>
          <div class="print-module-info">
            <strong>${exam.moduleCode}</strong> &mdash; ${exam.moduleName}
            &nbsp;&nbsp;|&nbsp;&nbsp; Instructor: ${exam.instructorName}
            ${pageNum > 1 ? `&nbsp;&nbsp;|&nbsp;&nbsp; <em>(Page ${pageNum} of ${totalPages})</em>` : ''}
          </div>
        </div>
        <img src="assets/EAU_Group_logo.png" alt="EAU Logo" class="print-logo">
      </div>`;

    let infoBlockHtml = '';
    if (isFirst) {
      infoBlockHtml = `
        <div class="print-info-row">
          <div class="print-info-block">
            <table class="print-info-table">
              <tr><td>Module:</td><td>${exam.moduleCode} — ${exam.moduleName}</td></tr>
              <tr><td>Exam Type:</td><td>${exam.examName}</td></tr>
              <tr><td>Semester:</td><td>${exam.semester}</td></tr>
              <tr><td>Date:</td><td>${formatDate(exam.date)}</td></tr>
              <tr><td>Venue:</td><td>${classroom ? classroom.name : exam.venueId}</td></tr>
              <tr><td>Instructor:</td><td>${exam.instructorName}</td></tr>
              <tr><td>Timings:</td><td>${formatTime(exam.startTime)} — ${formatTime(exam.endTime)}</td></tr>
              <tr><td>Total Students:</td><td><strong>${students.length}</strong></td></tr>
            </table>
          </div>
          <div class="print-info-block">
            <table class="print-info-table">
              <tr>
                <td>No. of Present:</td>
                <td><span class="signature-line">&nbsp;</span></td>
              </tr>
              <tr>
                <td>No. of Absent:</td>
                <td><span class="signature-line">&nbsp;</span></td>
              </tr>
              <tr>
                <td>Invigilator:</td>
                <td>${exam.invigilatorName || '—'}</td>
              </tr>
              <tr>
                <td style="padding-top:16pt;">Invigilator<br>Signature:</td>
                <td style="padding-top:16pt;"><span class="signature-line" style="width:100pt;">&nbsp;</span></td>
              </tr>
              <tr>
                <td style="padding-top:8pt;">Instructor<br>Signature:</td>
                <td style="padding-top:8pt;"><span class="signature-line" style="width:100pt;">&nbsp;</span></td>
              </tr>
            </table>
          </div>
        </div>`;
    }

    const pageStudents = students.slice(startIdx, startIdx + ROWS_PER_PAGE);
    const rowsHtml = pageStudents.map((s, i) => `
      <tr>
        <td class="col-no">${startIdx + i + 1}</td>
        <td class="col-id">${s.studentId}</td>
        <td class="col-name">${s.studentName}</td>
        <td class="col-seat" style="font-weight:bold; color:#1a3a5c;">${s.seatAssigned || '—'}</td>
        <td class="col-sig">&nbsp;</td>
      </tr>`).join('');

    const tableHtml = `
      <table class="print-student-table">
        <thead>
          <tr>
            <th class="col-no">#</th>
            <th class="col-id">Student ID</th>
            <th class="col-name">Student Full Name</th>
            <th class="col-seat">Seat</th>
            <th class="col-sig">Signature</th>
          </tr>
        </thead>
        <tbody>${rowsHtml}</tbody>
      </table>`;

    const footerHtml = `
      <div class="print-footer">
        <span>${exam.moduleCode} — ${exam.moduleName} — ${exam.examName} — ${formatDate(exam.date)}</span>
        <span>Page ${pageNum} of ${totalPages}</span>
      </div>`;

    return `
      <div class="print-page">
        ${headerHtml}
        ${infoBlockHtml}
        ${tableHtml}
        ${footerHtml}
      </div>`;
  }

  function loadAndRender() {
    const params  = new URLSearchParams(window.location.search);
    const examId  = params.get('examId');
    if (!examId) {
      document.getElementById('loadingMsg').textContent = 'Error: No exam ID provided.';
      return;
    }

    try {
      const exam       = getExam(examId);
      const classrooms = getClassrooms();

      if (!exam) throw new Error('Exam not found');

      const classroom = classrooms.find(c => c.id === exam.venueId);
      document.title  = `Attendance — ${exam.moduleCode} ${exam.examName}`;

      const venueIds = exam.venueIds && exam.venueIds.length > 0 ? exam.venueIds : (exam.venueId ? [exam.venueId] : []);

      let pagesHtml = '';
      for (const venueId of venueIds) {
        const venueClassroom = classrooms.find(c => c.id === venueId);
        const venueStudents  = venueIds.length > 1
          ? exam.students.filter(s => s.venueId === venueId)
          : exam.students;
        const sorted = sortBySeat(venueStudents);
        if (sorted.length === 0) continue;
        const totalPages = Math.max(1, Math.ceil(sorted.length / ROWS_PER_PAGE));
        for (let p = 1; p <= totalPages; p++) {
          pagesHtml += buildAttendancePage(exam, venueClassroom || classroom, sorted, p, totalPages, (p - 1) * ROWS_PER_PAGE);
        }
      }

      document.getElementById('loadingMsg').style.display = 'none';
      const content = document.getElementById('printContent');
      content.style.display = 'block';
      content.innerHTML = pagesHtml || '<p style="text-align:center;padding:40px;color:#888;">No students assigned to this exam yet.</p>';

    } catch (err) {
      document.getElementById('loadingMsg').textContent = 'Error loading exam: ' + err.message;
    }
  }

  // Wait for storage.js to finish its async init, then render
  setTimeout(loadAndRender, 50);
</script>
</body>
</html>
